name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.30.0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm --filter @flyingrobots/geordi-example-browser-render-everywhere exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Verify package names
        run: pnpm test:package-names

      - name: Verify docs
        run: pnpm test:docs

      - name: Verify test placeholders
        run: pnpm test:placeholders

      - name: Verify repo sludge
        run: pnpm test:repo-sludge

      - name: Verify package exports
        run: pnpm test:exports

      - name: Verify bunny render gates
        run: pnpm test:render-everywhere:bunny

      - name: Verify strict text fixture validation gate
        run: pnpm test:render-everywhere:strict-text-generated

      - name: Verify browser render-everywhere and strict text smoke gates
        run: pnpm --filter @flyingrobots/geordi-example-browser-render-everywhere test:browser
