version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        dependency-type: development
        patterns:
          - "*"
      runtime:
        dependency-type: production
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Los_Angeles
    open-pull-requests-limit: 2
    groups:
      github-actions:
        patterns:
          - "*"
