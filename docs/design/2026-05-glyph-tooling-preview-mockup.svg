<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Geordi Glyph Workbench strict text preview mockup</title>
  <desc id="desc">A strict text fixture preview showing positioned glyph run overlays with line boxes, baselines, glyph boxes, origins, advances, font labels, and fixed-point conversion details.</desc>
  <style>
    .bg { fill: #eef2f6; }
    .frame { fill: #ffffff; stroke: #cfd8e3; }
    .nav { fill: #111827; }
    .nav-text { fill: #cbd5e1; font: 500 14px system-ui, -apple-system, Segoe UI, sans-serif; }
    .nav-active { fill: #f97316; }
    .top { fill: #f8fafc; stroke: #d8e1ec; }
    .title { fill: #111827; font: 700 20px system-ui, -apple-system, Segoe UI, sans-serif; }
    .small { fill: #64748b; font: 500 12px system-ui, -apple-system, Segoe UI, sans-serif; }
    .label { fill: #475569; font: 700 11px system-ui, -apple-system, Segoe UI, sans-serif; }
    .body { fill: #1f2937; font: 500 14px system-ui, -apple-system, Segoe UI, sans-serif; }
    .strong { fill: #111827; font: 700 14px system-ui, -apple-system, Segoe UI, sans-serif; }
    .mono { fill: #334155; font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .mono-dark { fill: #dbeafe; font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .panel { fill: #ffffff; stroke: #d8e1ec; }
    .field { fill: #f8fafc; stroke: #cbd5e1; }
    .canvas { fill: #0b1120; stroke: #1e293b; }
    .glyph { fill: rgba(14, 165, 233, 0.14); stroke: #38bdf8; }
    .linebox { fill: rgba(249, 115, 22, 0.08); stroke: #f97316; stroke-width: 2; }
    .baseline { stroke: #fbbf24; stroke-width: 2; stroke-dasharray: 8 6; }
    .origin { fill: #22c55e; }
    .advance { stroke: #a78bfa; stroke-width: 2; marker-end: url(#arrow); }
    .warn { fill: #fff7ed; stroke: #fdba74; }
    .ok { fill: #ecfdf5; stroke: #86efac; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
