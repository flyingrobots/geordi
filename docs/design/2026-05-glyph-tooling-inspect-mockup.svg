<svg width="1280" height="760" viewBox="0 0 1280 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Geordi Glyph Workbench font pack inspector mockup</title>
  <desc id="desc">A font pack inspector screen showing metadata, verification status, cmap coverage, glyph inventory, and a rough bounds preview while excluding host fonts from the contract.</desc>
  <style>
    .bg { fill: #edf2f7; }
    .frame { fill: #ffffff; stroke: #cfd8e3; }
    .nav { fill: #111827; }
    .nav-text { fill: #cbd5e1; font: 500 14px system-ui, -apple-system, Segoe UI, sans-serif; }
    .nav-active { fill: #38bdf8; }
    .top { fill: #f8fafc; stroke: #d8e1ec; }
    .title { fill: #111827; font: 700 20px system-ui, -apple-system, Segoe UI, sans-serif; }
    .small { fill: #64748b; font: 500 12px system-ui, -apple-system, Segoe UI, sans-serif; }
    .label { fill: #475569; font: 700 11px system-ui, -apple-system, Segoe UI, sans-serif; letter-spacing: .2px; }
    .body { fill: #1f2937; font: 500 14px system-ui, -apple-system, Segoe UI, sans-serif; }
    .strong { fill: #111827; font: 700 14px system-ui, -apple-system, Segoe UI, sans-serif; }
    .mono { fill: #334155; font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .panel { fill: #ffffff; stroke: #d8e1ec; }
    .field { fill: #f8fafc; stroke: #cbd5e1; }
    .ok { fill: #dcfce7; stroke: #86efac; }
    .warn { fill: #fff7ed; stroke: #fdba74; }
    .accent { fill: #0284c7; }
    .divider { stroke: #e2e8f0; }
    .grid { fill: #f8fafc; stroke: #d8e1ec; }
  </style>
  <rect class="bg" width="1280" height="760"/>
  <rect class="frame" x="20" y="20" width="1240" height="720" rx="8"/>
  <rect class="nav" x="20" y="20" width="184" height="720" rx="8"/>
  <rect class="nav" x="188" y="20" width="16" height="720"/>
  <text class="nav-active" x="44" y="58">Geordi</text>
  <text class="nav-text" x="44" y="92">Glyph Workbench</text>
  <line x1="44" y1="116" x2="180" y2="116" stroke="#334155"/>
  <text class="nav-text" x="44" y="154">Font Pack</text>
  <rect x="32" y="132" width="4" height="34" fill="#38bdf8" rx="2"/>
  <text class="nav-text" x="44" y="196">Fixture</text>
  <text class="nav-text" x="44" y="238">Preview</text>
  <text class="nav-text" x="44" y="280">Failures</text>
  <text class="nav-text" x="44" y="322">Compare</text>
  <text class="small" x="44" y="666" fill="#94a3b8">Artifact loaded</text>
  <text class="small" x="44" y="690" fill="#94a3b8">font-pack.geordi.json</text>

  <rect class="top" x="204" y="20" width="1056" height="72" rx="8"/>
  <text class="title" x="232" y="56">Font pack inspector</text>
  <rect class="ok" x="724" y="38" width="166" height="30" rx="15"/>
  <text class="small" x="746" y="57">verified: 2 assets</text>
  <rect class="field" x="906" y="38" width="300" height="30" rx="15"/>
  <text class="mono" x="928" y="57">fontPackHash sha256:9b7f...12c0</text>

  <rect class="panel" x="232" y="116" width="312" height="260" rx="8"/>
  <text class="strong" x="256" y="148">Manifest metadata</text>
  <line class="divider" x1="256" y1="170" x2="520" y2="170"/>
  <text class="label" x="256" y="202">FONT ID</text>
  <text class="body" x="354" y="202">lato-regular</text>
  <text class="label" x="256" y="234">FAMILY</text>
  <text class="body" x="354" y="234">Lato Regular 400</text>
  <text class="label" x="256" y="266">FACE</text>
  <text class="body" x="354" y="266">index 0 of 1</text>
  <text class="label" x="256" y="298">PATH</text>
  <text class="mono" x="354" y="298">assets/fonts/lato/...</text>
  <text class="label" x="256" y="330">HASH</text>
  <text class="mono" x="354" y="330">sha256:d6b4f5...</text>
  <rect class="warn" x="256" y="346" width="264" height="24" rx="12"/>
  <text class="small" x="276" y="363">License recorded, not interpreted</text>

  <rect class="panel" x="568" y="116" width="296" height="260" rx="8"/>
  <text class="strong" x="592" y="148">Verification status</text>
  <line class="divider" x1="592" y1="170" x2="840" y2="170"/>
  <rect class="ok" x="592" y="192" width="248" height="40" rx="7"/>
  <text class="body" x="614" y="217">Font bytes match manifest</text>
  <rect class="ok" x="592" y="246" width="248" height="40" rx="7"/>
  <text class="body" x="614" y="271">License bytes match manifest</text>
  <rect class="ok" x="592" y="300" width="248" height="40" rx="7"/>
  <text class="body" x="614" y="325">No absolute or traversal paths</text>
  <text class="small" x="592" y="362">Failures link to JSON path and file path.</text>

  <rect class="panel" x="888" y="116" width="336" height="260" rx="8"/>
  <text class="strong" x="912" y="148">Rough outline and bounds</text>
  <rect x="912" y="172" width="288" height="150" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <line x1="936" y1="282" x2="1176" y2="282" stroke="#f97316" stroke-width="2"/>
  <line x1="936" y1="244" x2="1176" y2="244" stroke="#94a3b8" stroke-dasharray="5 5"/>
  <path d="M986 282 L1032 188 L1078 282 M1004 246 L1060 246" fill="none" stroke="#0f766e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="976" y="184" width="112" height="98" fill="none" stroke="#0284c7" stroke-width="2" stroke-dasharray="6 4"/>
  <text class="mono" x="936" y="348">selected glyph: gid 36, U+0041</text>
  <text class="small" x="936" y="366">Outline preview appears only when extraction exists.</text>

  <rect class="panel" x="232" y="400" width="992" height="276" rx="8"/>
  <text class="strong" x="256" y="432">Glyph inventory</text>
  <text class="small" x="256" y="456">Sorted by glyph id with cmap coverage and lookup.</text>
  <rect class="field" x="938" y="424" width="262" height="34" rx="17"/>
  <text class="mono" x="960" y="445">lookup U+0041 -> gid 36</text>
  <line class="divider" x1="256" y1="474" x2="1200" y2="474"/>

  <rect class="grid" x="256" y="498" width="98" height="54" rx="6"/>
  <text class="mono" x="278" y="522">gid 0</text>
  <text class="small" x="278" y="542">.notdef</text>
  <rect class="grid" x="366" y="498" width="98" height="54" rx="6"/>
  <text class="mono" x="388" y="522">gid 3</text>
  <text class="small" x="388" y="542">space</text>
  <rect class="grid" x="476" y="498" width="98" height="54" rx="6"/>
  <text class="mono" x="498" y="522">gid 36</text>
  <text class="small" x="498" y="542">U+0041</text>
  <rect class="grid" x="586" y="498" width="98" height="54" rx="6"/>
  <text class="mono" x="608" y="522">gid 37</text>
  <text class="small" x="608" y="542">U+0042</text>
  <rect class="grid" x="696" y="498" width="98" height="54" rx="6"/>
  <text class="mono" x="718" y="522">gid 38</text>
  <text class="small" x="718" y="542">U+0043</text>
  <rect class="grid" x="806" y="498" width="98" height="54" rx="6"/>
  <text class="mono" x="828" y="522">gid 39</text>
  <text class="small" x="828" y="542">U+0044</text>
  <rect class="grid" x="916" y="498" width="98" height="54" rx="6"/>
  <text class="mono" x="938" y="522">gid 40</text>
  <text class="small" x="938" y="542">U+0045</text>
  <rect class="grid" x="1026" y="498" width="98" height="54" rx="6"/>
  <text class="mono" x="1048" y="522">gid 41</text>
  <text class="small" x="1048" y="542">U+0046</text>
  <rect class="grid" x="1136" y="498" width="64" height="54" rx="6"/>
  <text class="mono" x="1154" y="522">...</text>
  <text class="small" x="1150" y="542">2194</text>

  <text class="label" x="256" y="596">CMAP COVERAGE</text>
  <rect x="256" y="612" width="520" height="18" rx="9" fill="#e2e8f0"/>
  <rect x="256" y="612" width="370" height="18" rx="9" fill="#0f766e"/>
  <rect x="634" y="612" width="56" height="18" rx="9" fill="#f59e0b"/>
  <text class="small" x="256" y="652">Latin basic mapped, extended ranges partially present. Unsupported tables report warnings instead of guesses.</text>
  <rect class="warn" x="902" y="604" width="298" height="48" rx="8"/>
  <text class="strong" x="926" y="626" fill="#9a3412">Host fonts are outside the contract</text>
  <text class="small" x="926" y="646">Inspector reads only loaded artifact bytes.</text>
</svg>
